<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Ulang Tahun 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-image: url(zbackground.jpeg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow-x: hidden;
            padding: 10px;
        }

        .container {
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 2.5em;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: bounce 0.6s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .cake-container {
            position: relative;
            width: 100%;
            max-width: 280px;
            height: 200px;
            margin: 0 auto;
            perspective: 1000px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Kue Utama - Lapisan Bawah */
        .cake {
            position: relative;
            width: 100%;
            height: 80px;
            background: linear-gradient(to bottom, #af4b11, #af4b11);
            border-radius: 30px 30px 20px 20px;
            margin: 0 auto;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), inset -5px -5px 15px rgba(0, 0, 0, 0.2);
            border: 3px solid #FF1493;
            position: absolute;
            bottom: 0;
        }

        /* Lapisan Tengah */
        .cake::before {
            content: '';
            position: absolute;
            width: 85%;
            height: 70px;
            background: linear-gradient(to bottom, #ff0180, #c56516);
            border-radius: 25px 25px 20px 20px;
            top: -65px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset -3px -3px 8px rgba(0, 0, 0, 0.2), 0 5px 15px rgba(0, 0, 0, 0.2);
            border: 2px solid #FF69B4;
        }

        /* Lapisan Atas */
        .cake::after {
            display: none;
        }

        /* Dekorasi Kue */
        .decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .cherry {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 30% 30%, #FF4444, #CC0000);
            border-radius: 50%;
            left: 50%;
            top: 20px;
            transform: translateX(-50%);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .candle-holder {
            position: absolute;
            width: 100%;
            height: 70px;
            bottom: 80px;
            left: 0;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 0 20px 15px;
        }

        /* Lilin */
        .candle {
            position: relative;
            width: 20px;
            height: 60px;
            background: #FFE082;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: inset -2px -2px 5px rgba(0, 0, 0, 0.2), 0 3px 8px rgba(0, 0, 0, 0.2);
            border: 1px solid #FFD54F;
        }

        .candle:hover {
            transform: scale(1.05);
        }

        .candle.burning {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.95); }
        }

        /* Api Lilin */
        .flame {
            position: absolute;
            width: 12px;
            height: 25px;
            background: linear-gradient(to top, #FF6B00, #FFD700);
            border-radius: 50% 50% 50% 30%;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(255, 107, 0, 0.8), 0 0 20px rgba(255, 215, 0, 0.5);
            animation: flameAnimation 0.6s ease-in-out infinite;
        }

        @keyframes flameAnimation {
            0%, 100% { transform: translateX(-50%) scaleY(1) scaleX(1); }
            25% { transform: translateX(-50%) scaleY(1.1) scaleX(0.9); }
            50% { transform: translateX(-50%) scaleY(0.9) scaleX(1.1); }
            75% { transform: translateX(-50%) scaleY(1.05) scaleX(0.95); }
        }

        .candle.extinguished .flame {
            display: none;
        }

        .candle.extinguished::before {
            content: '💨';
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            animation: smoke 0.8s ease-out forwards;
        }

        @keyframes smoke {
            0% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-30px);
            }
        }

        .message {
            font-size: 1em;
            color: #fff;
            margin-top: 20px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .instruction {
            font-size: 0.9em;
            color: #FFE082;
            margin-top: 15px;
            font-style: italic;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 1;
        }

        .button-container {
            margin-top: 30px;
        }

        button {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #333;
            border: none;
            padding: 10px 20px;
            font-size: 0.9em;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            font-weight: bold;
            margin: 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .all-extinguished {
            font-size: 1.5em;
            margin-top: 15px;
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .status {
            color: #FFE082;
            margin-top: 10px;
            font-size: 0.9em;
        }

        /* Media Query untuk Desktop */
        @media (min-width: 768px) {
            h1 {
                font-size: 3.5em;
                margin-bottom: 20px;
            }

            .cake-container {
                width: 300px;
                height: 400px;
                margin: 30px auto;
            }

            .cake {
                width: 250px;
                height: 90px;
            }

            .cake::before {
                width: 220px;
                height: 80px;
                top: -75px;
            }

            .cake::after {
                width: 190px;
                height: 70px;
                top: -150px;
            }

            .candle-holder {
                top: -150px;
                height: 80px;
            }

            .message {
                font-size: 1.2em;
                margin-top: 40px;
            }

            .instruction {
                font-size: 1em;
                margin-top: 20px;
            }

            button {
                padding: 12px 30px;
                font-size: 1em;
            }

            .all-extinguished {
                font-size: 2em;
                margin-top: 20px;
            }

            .status {
                font-size: 0.95em;
                margin-top: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> YAUMUL MILAD SAYANG 🎉</h1>
        
        <div class="cake-container">
            <div class="cake">
                <div class="decoration">
                    <div class="cherry"></div>
                </div>
                <div class="candle-holder" id="candleHolder">
                    <!-- Lilin akan ditambahkan dengan JavaScript -->
                </div>
            </div>
        </div>

        <div class="message">
            Do'a dari andoy Semoga Selalu Diberikan Kesehatan, umur yang panjang dan semoga kita sama-sama terus 🎂
        </div>

        <div class="instruction">
            Klik lilinnya na syg
        </div>

        <div class="status">
            <span id="status">Lilin tersisa: <span id="candleCount">5</span></span>
        </div>

        <div class="all-extinguished" id="celebration" style="display: none;">
             Selamat ulang tahun sayang walaupun kuenya digital hehehe 🎊
        </div>

        <div class="button-container">
            <button onclick="resetCandles()">Reset Lilin</button>
            <button onclick="lightAllCandles()">Nyalakan Semua</button>
        </div>
    </div>

    <script>
        const numCandles = 5;
        const candleHolder = document.getElementById('candleHolder');
        const candleCount = document.getElementById('candleCount');
        const celebration = document.getElementById('celebration');
        let extinguishedCount = 0;

        // Membuat lilin
        function createCandles() {
            candleHolder.innerHTML = '';
            extinguishedCount = 0;
            
            for (let i = 0; i < numCandles; i++) {
                const candle = document.createElement('div');
                candle.className = 'candle burning';
                candle.innerHTML = '<div class="flame"></div>';
                candle.onclick = (e) => toggleCandle(candle, e);
                candleHolder.appendChild(candle);
            }
            
            updateStatus();
            celebration.style.display = 'none';
        }

        // Toggle lilin on/off
        function toggleCandle(candle, event) {
            event.stopPropagation();
            
            if (candle.classList.contains('burning')) {
                candle.classList.remove('burning');
                candle.classList.add('extinguished');
                extinguishedCount++;
                playExtinguishSound();
                createConfetti();
                playMeriahEffect();
                showCelebrationMessage();
            } else {
                candle.classList.remove('extinguished');
                candle.classList.add('burning');
                extinguishedCount--;
            }
            
            updateStatus();
            checkAllExtinguished();
        }

        // Update status
        function updateStatus() {
            const remaining = numCandles - extinguishedCount;
            candleCount.textContent = remaining;
        }

        // Check jika semua lilin sudah dimatikan
        function checkAllExtinguished() {
            if (extinguishedCount === numCandles) {
                celebration.style.display = 'block';
                createBigCelebration();
            }
        }

        // Reset lilin
        function resetCandles() {
            createCandles();
        }

        // Nyalakan semua lilin
        function lightAllCandles() {
            const candles = document.querySelectorAll('.candle');
            candles.forEach(candle => {
                if (candle.classList.contains('extinguished')) {
                    candle.classList.remove('extinguished');
                    candle.classList.add('burning');
                }
            });
            extinguishedCount = 0;
            updateStatus();
            celebration.style.display = 'none';
        }

        // Efek suara (opsional - ganti dengan file suara Anda jika ada)
        function playExtinguishSound() {
            // Membuat suara dengan Web Audio API
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 0.1);
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch(e) {
                // Jika browser tidak support, skip
            }
        }

        // Efek meriah saat lilin mati
        function playMeriahEffect() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Suara 1 - Bunyi tinggi meriah
                const osc1 = audioContext.createOscillator();
                const gain1 = audioContext.createGain();
                osc1.connect(gain1);
                gain1.connect(audioContext.destination);
                osc1.frequency.setValueAtTime(800, audioContext.currentTime);
                osc1.frequency.exponentialRampToValueAtTime(1200, audioContext.currentTime + 0.1);
                gain1.gain.setValueAtTime(0.2, audioContext.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0, audioContext.currentTime + 0.15);
                osc1.start(audioContext.currentTime);
                osc1.stop(audioContext.currentTime + 0.15);

                // Suara 2 - Bunyi rendah
                setTimeout(() => {
                    const osc2 = audioContext.createOscillator();
                    const gain2 = audioContext.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioContext.destination);
                    osc2.frequency.setValueAtTime(600, audioContext.currentTime);
                    osc2.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.08);
                    gain2.gain.setValueAtTime(0.15, audioContext.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0, audioContext.currentTime + 0.1);
                    osc2.start(audioContext.currentTime);
                    osc2.stop(audioContext.currentTime + 0.1);
                }, 50);
            } catch(e) {
                // Skip jika tidak support
            }
        }

        // Tampilkan pesan meriah
        function showCelebrationMessage() {
            const messages = ['🎉 ANDOY!', '✨ HASRATUY!', '🎊 ANDOY!', '💫 HASRATUY!', '⭐ ANDOY!'];
            const message = messages[Math.floor(Math.random() * messages.length)];
            
            const msgElement = document.createElement('div');
            msgElement.textContent = message;
            msgElement.style.position = 'fixed';
            msgElement.style.left = (Math.random() * 80 + 10) + '%';
            msgElement.style.top = (Math.random() * 40 + 20) + '%';
            msgElement.style.fontSize = '1.5em';
            msgElement.style.fontWeight = 'bold';
            msgElement.style.pointerEvents = 'none';
            msgElement.style.animation = 'popUp 1.5s ease-out forwards';
            msgElement.style.zIndex = '1000';
            
            document.body.appendChild(msgElement);
            
            setTimeout(() => msgElement.remove(), 1500);
        }

        // Tambahkan CSS animation popUp
        const style = document.createElement('style');
        style.textContent = `
            @keyframes popUp {
                0% {
                    opacity: 1;
                    transform: scale(0.5) translateY(0);
                }
                100% {
                    opacity: 0;
                    transform: scale(1) translateY(-100px);
                }
            }
        `;
        document.head.appendChild(style);

        // Efek Confetti
        function createConfetti() {
            for (let i = 0; i < 20; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = (Math.random() * 100) + '%';
                confetti.style.top = '-10px';
                
                const colors = ['#FF6B9D', '#667eea', '#FFD700', '#00D084', '#FF1493', '#FF69B4', '#FFB6D9'];
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                document.body.appendChild(confetti);
                
                const duration = 1.5 + Math.random() * 0.8;
                const xMove = (Math.random() - 0.5) * 250;
                
                let startTime = Date.now();
                const animate = () => {
                    const elapsed = (Date.now() - startTime) / 1000;
                    const progress = elapsed / duration;
                    
                    if (progress < 1) {
                        confetti.style.top = (progress * window.innerHeight) + 'px';
                        confetti.style.left = (parseFloat(confetti.style.left) + (xMove / 60)) + 'px';
                        confetti.style.opacity = 1 - progress;
                        confetti.style.transform = 'rotate(' + (progress * 360) + 'deg)';
                        requestAnimationFrame(animate);
                    } else {
                        confetti.remove();
                    }
                };
                animate();
            }
        }

        // Celebrasi besar saat semua lilin dimatikan
        function createBigCelebration() {
            for (let i = 0; i < 25; i++) {
                setTimeout(() => createConfetti(), i * 50);
            }
        }

        // Inisialisasi
        createCandles();

        // Easter egg: keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                const candles = document.querySelectorAll('.candle');
                const burningCandles = Array.from(candles).filter(c => c.classList.contains('burning'));
                if (burningCandles.length > 0) {
                    toggleCandle(burningCandles[Math.floor(Math.random() * burningCandles.length)], {stopPropagation: () => {}});
                }
            }
        });
    </script>
</body>
</html>
